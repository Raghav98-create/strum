<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Strum — Login</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --brown:  #3b1f0e;
      --amber:  #c8762b;
      --cream:  #fdf6ec;
      --light:  #f5e9d6;
      --text:   #2b1a0a;
      --muted:  #7a5c3e;
      --radius: 10px;
    }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: var(--cream);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1.1rem 2.5rem;
      background: var(--brown);
    }
    .logo {
      font-size: 1.6rem;
      font-weight: 700;
      color: var(--amber);
      letter-spacing: 2px;
      text-transform: uppercase;
      text-decoration: none;
    }

    main {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 3rem 1rem;
    }

    .card {
      background: #fff;
      border: 1px solid #e6d5bf;
      border-radius: var(--radius);
      padding: 2.5rem 2rem;
      width: 100%;
      max-width: 420px;
    }

    .card h1 {
      font-size: 1.7rem;
      font-weight: 700;
      color: var(--brown);
      margin-bottom: 0.3rem;
    }
    .card .sub {
      color: var(--muted);
      font-size: 0.95rem;
      margin-bottom: 2rem;
    }

    .field { margin-bottom: 1.2rem; }
    label {
      display: block;
      font-size: 0.88rem;
      font-weight: 600;
      margin-bottom: 0.4rem;
      color: var(--brown);
    }
    input {
      width: 100%;
      padding: 0.7rem 1rem;
      border: 1.5px solid #d9c4a8;
      border-radius: 6px;
      font-size: 0.97rem;
      background: var(--cream);
      color: var(--text);
      transition: border-color 0.2s;
    }
    input:focus { outline: none; border-color: var(--amber); }

    .error-msg {
      display: none;
      background: #fdecea;
      color: #b00020;
      border-radius: 6px;
      padding: 0.75rem 1rem;
      font-size: 0.9rem;
      font-weight: 600;
      margin-bottom: 1.2rem;
    }

    .btn {
      width: 100%;
      background: var(--amber);
      color: #fff;
      padding: 0.85rem;
      border-radius: var(--radius);
      font-size: 1rem;
      font-weight: 600;
      border: none;
      cursor: pointer;
      transition: background 0.2s, transform 0.15s;
    }
    .btn:hover { background: #a85e1e; transform: translateY(-1px); }
    .btn:disabled { opacity: 0.65; cursor: not-allowed; transform: none; }

    footer {
      background: var(--brown);
      color: var(--cream);
      text-align: center;
      padding: 1.5rem 1rem;
      font-size: 0.88rem;
      opacity: 0.9;
    }
    footer span { color: var(--amber); }
  </style>
</head>
<body>

  <nav>
    <a href="index.html" class="logo">Strum</a>
  </nav>

  <main>
    <div class="card">
      <h1>Admin Login</h1>
      <p class="sub">Sign in to manage your bookings.</p>

      <div class="error-msg" id="error-msg">Invalid email or password.</div>

      <form id="login-form">
        <div class="field">
          <label for="email">Email Address</label>
          <input type="email" id="email" placeholder="admin@example.com" required />
        </div>
        <div class="field">
          <label for="password">Password</label>
          <input type="password" id="password" placeholder="••••••••" required />
        </div>
        <button type="submit" class="btn" id="submit-btn">Sign In</button>
      </form>
    </div>
  </main>

  <footer>
    <p>&copy; 2026 <span>Strum</span> &mdash; Guitar Lessons.</p>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    const { createClient } = supabase;
    const sb = createClient(
      'https://eidjxnwoynimgrbmmicb.supabase.co',
      'sb_publishable_3md-vc9R948LxWNQT3eT3g_SsoeoQZo'
    );

    // If already logged in, skip straight to admin
    sb.auth.getSession().then(({ data: { session } }) => {
      if (session) window.location.href = 'admin.html';
    });

    document.getElementById('login-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('submit-btn');
      const errorEl = document.getElementById('error-msg');

      errorEl.style.display = 'none';
      btn.textContent = 'Signing in…';
      btn.disabled = true;

      const { error } = await sb.auth.signInWithPassword({
        email:    document.getElementById('email').value.trim(),
        password: document.getElementById('password').value,
      });

      if (error) {
        errorEl.style.display = 'block';
        btn.textContent = 'Sign In';
        btn.disabled = false;
      } else {
        window.location.href = 'admin.html';
      }
    });
  </script>

</body>
</html>
